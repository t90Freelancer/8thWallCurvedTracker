    }</style></head><body><div id="load-debug"><div>Loading AR...</div></div><script>const showLoadDebug = (message) => {
    const el = document.getElementById('load-debug')
    if (!el) return
    el.style.display = 'flex'
    el.firstElementChild.textContent = message
  }

  window.addEventListener('error', event => showLoadDebug(event.message || 'Runtime error'))
  window.addEventListener('unhandledrejection', event => {
    const reason = event.reason && (event.reason.message || String(event.reason))
    showLoadDebug(reason || 'Runtime promise error')
  })
  window.setTimeout(() => {
    if (!window.XR8) {
      showLoadDebug('8th Wall XR script did not load. Check network/CDN/domain.')
    }
  }, 8000)</script><script src="bundle.js?v=12"></script></body></html>
