<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>8th Wall Person Tracking</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
</head>
<body>
  <main id="app">
    <canvas id="xr-canvas" aria-label="AR camera"></canvas>
    <canvas id="effect-canvas" aria-label="Person tracking effect"></canvas>

    <div id="topbar">
      <div id="status">
        <span id="status-dot"></span>
        <span id="status-text">Dang tai</span>
      </div>

      <div id="camera-switch" role="group" aria-label="Camera">
        <button class="seg is-active" data-camera="back" type="button">Back</button>
        <button class="seg" data-camera="front" type="button">Front</button>
      </div>
    </div>

    <div id="controls">
      <button id="start-button" type="button">
        <span class="play-icon"></span>
        <span>Start</span>
      </button>

      <label id="smooth-control">
        <span>Smooth</span>
        <input id="smooth-slider" type="range" min="0" max="100" value="76">
      </label>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
